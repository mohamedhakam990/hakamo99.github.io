<!-- Google AdSense -->

<style>
*{margin:0;padding:0;box-sizing:border-box;}

body{
font-family:"Cairo",sans-serif;
background:linear-gradient(135deg,#020617,#0f172a);
color:white;
text-align:center;
}

/* Loader */
#loader{
position:fixed;
width:100%;
height:100%;
background:#020617;
display:flex;
justify-content:center;
align-items:center;
z-index:999;
}

.circle{
width:60px;
height:60px;
border:5px solid #00c6ff;
border-top:5px solid transparent;
border-radius:50%;
animation:spin 1s linear infinite;
}

@keyframes spin{
100%{transform:rotate(360deg);}
}

/* Glass */
.glass{
background:rgba(255,255,255,0.08);
backdrop-filter:blur(15px);
border-radius:20px;
border:1px solid rgba(255,255,255,0.15);
margin:20px;
padding:20px;
}

/* Logo */
.logo{
width:160px;
border-radius:50%;
animation:glow 2s infinite;
}

@keyframes glow{
0%{box-shadow:0 0 10px #00c6ff;}
50%{box-shadow:0 0 30px #00c6ff;}
100%{box-shadow:0 0 10px #00c6ff;}
}

/* Buttons */
.btn{
display:block;
margin:10px auto;
padding:14px;
border-radius:12px;
text-decoration:none;
color:white;
font-weight:bold;
transition:0.3s;
}

.telegram{background:linear-gradient(45deg,#0088cc,#00c6ff);}
.tiktok{background:linear-gradient(45deg,#000,#ff0050);}
.facebook{background:linear-gradient(45deg,#1877f2,#4c8bf5);}

.btn:hover{
transform:scale(1.08);
box-shadow:0 0 25px #38bdf8;
}

.counter{
color:#00c6ff;
margin-top:10px;
}

.ad{
margin:20px;
padding:15px;
border-radius:15px;
background:rgba(255,255,255,0.05);
border:1px dashed rgba(255,255,255,0.2);
}
</style>

</head>
<body>

<!-- Loading -->
<div id="loader"><div class="circle"></div></div>

<!-- إعلان -->
<div class="ad">
<!-- إعلانك هنا -->
</div>

<!-- Header -->
<div class="glass">
<img src="logo.jpg" class="logo">

<h1>HAKAMO</h1>
<p>Telegram Channel 🚀</p>

<p onclick="copyUser()" style="cursor:pointer;color:#38bdf8;">
@MohamedHakam99 (اضغط للنسخ)
</p>

👀 الزوار: <span id="visits">0</span>
</div>
</div>

<!-- About -->

أفضل قناة للإنترنت المجاني 💯  
أقوى الكونفجات والتحديثات اليومية 🚀
</p>
</div>

<!-- Links -->
<div class="glass">
<h2>📱 حساباتي</h2>

<a class="btn telegram" href="https://t.me/Hakamo99">Telegram</a>
<a class="btn tiktok" href="https://www.tiktok.com/@hakamo99">TikTok</a>
<a class="btn facebook" href="https://www.facebook.com/mohamedhakam990">Facebook</a>

</div>

<!-- Config -->
<div class="glass">
<h2>⚡ تحميل الكونفجات</h2>

<a class="btn telegram" href="go.html">
اضغط هنا للدخول 🚀
</a>

</div>

<script>

navigator.clipboard.writeText("@MohamedHakam99");
alert("تم النسخ ✅");
