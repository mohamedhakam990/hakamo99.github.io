<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Hakamo | Official</title>

<style>
*{margin:0;padding:0;box-sizing:border-box;}

body{
    font-family:"Cairo",sans-serif;
    background:linear-gradient(135deg,#020617,#0f172a);
    color:white;
    text-align:center;
}

/* Glow animation */
@keyframes glow {
    0% { box-shadow: 0 0 10px #00c6ff; }
    50% { box-shadow: 0 0 30px #00c6ff; }
    100% { box-shadow: 0 0 10px #00c6ff; }
}

/* Glass */
.glass{
    background:rgba(255,255,255,0.08);
    backdrop-filter:blur(15px);
    border-radius:20px;
    border:1px solid rgba(255,255,255,0.15);
    margin:20px;
    padding:20px;
}

/* Logo */
.logo{
    width:160px;
    border-radius:50%;
    animation:glow 2s infinite;
    margin-bottom:15px;
}

/* Title */
h1{
    font-size:28px;
}

/* Username */
.username{
    color:#38bdf8;
    margin-top:10px;
    cursor:pointer;
}

/* Buttons */
.btn{
    display:block;
    margin:10px auto;
    padding:14px;
    border-radius:12px;
    text-decoration:none;
    color:white;
    font-weight:bold;
    transition:0.3s;
}

.telegram{background:linear-gradient(45deg,#0088cc,#00c6ff);}
.tiktok{background:linear-gradient(45deg,#000,#ff0050);}
.facebook{background:linear-gradient(45deg,#1877f2,#4c8bf5);}

.btn:hover{
    transform:scale(1.05);
    box-shadow:0 0 20px #38bdf8;
}

/* Ads */
.ad{
    margin:20px;
    padding:15px;
    border-radius:15px;
    background:rgba(255,255,255,0.05);
    border:1px dashed rgba(255,255,255,0.2);
}
</style>

</head>
<body>

<!-- إعلان -->
<div class="ad">
ضع كود الإعلانات هنا
</div>

<!-- Header -->
<div class="glass">
<img src="logo.jpg" class="logo">

<h1>HAKAMO</h1>
<p>Telegram Channel 🚀</p>

<div class="username" onclick="copyUser()">
@MohamedHakam99 (اضغط للنسخ)
</div>
</div>

<!-- About -->
<div class="glass">
<h2>🔥 نبذة عن القناة</h2>
<p>
أفضل قناة للإنترنت المجاني 💯  
أقوى الكونفجات والتحديثات اليومية  
كل جديد أول بأول 🚀
</p>
</div>

<!-- Links -->
<div class="glass">
<h2>📱 حساباتي</h2>

<a class="btn telegram" href="https://t.me/Hakamo99">Telegram</a>
<a class="btn tiktok" href="https://www.tiktok.com/@hakamo99">TikTok</a>
<a class="btn facebook" href="https://www.facebook.com/mohamedhakam990">Facebook</a>

</div>

<!-- Config -->
<div class="glass">
<h2>⚡ كل اللي تحتاجه</h2>

<a class="btn telegram" href="https://t.me/Hakamo99/1978">
الدخول لكل الكونفجات
</a>
</div>

<script>
function copyUser(){
navigator.clipboard.writeText("@MohamedHakam99");
alert("تم النسخ ✅");
}
</script>

</body>
</html>
