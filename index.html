<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Hakamo | Ultimate</title>

<meta name="description" content="أفضل كونفجات الإنترنت المجاني">
<meta name="keywords" content="VPN, انترنت مجاني, Hakamo">

<style>
*{margin:0;padding:0;box-sizing:border-box;}

body{
font-family:"Cairo",sans-serif;
transition:0.4s;
overflow-x:hidden;
}

/* 🌙 DARK MODE */
body.dark{
color:white;
}
body.dark::before{
content:"";
position:fixed;
width:100%;
height:100%;
background:url('logo.jpg') center/cover no-repeat;
filter:blur(20px) brightness(0.3);
z-index:-1;
}

/* ☀️ LIGHT MODE */
body.light{
color:#111;
}
body.light::before{
content:"";
position:fixed;
width:100%;
height:100%;
background:url('logo.jpg') center/cover no-repeat;
filter:blur(10px) brightness(0.9);
z-index:-1;
}

/* Loader */
#loader{
position:fixed;
width:100%;
height:100%;
background:#020617;
display:flex;
justify-content:center;
align-items:center;
z-index:999;
}
.circle{
width:60px;height:60px;
border:5px solid #00c6ff;
border-top:5px solid transparent;
border-radius:50%;
animation:spin 1s linear infinite;
}
@keyframes spin{100%{transform:rotate(360deg);}}

/* Glass */
.glass{
background:rgba(255,255,255,0.08);
backdrop-filter:blur(20px);
border-radius:20px;
margin:20px;
padding:20px;
border:1px solid rgba(255,255,255,0.2);
box-shadow:0 0 30px rgba(0,0,0,0.5);
transition:0.3s;
}
body.light .glass{
background:rgba(255,255,255,0.6);
color:#000;
}

/* Logo */
.logo{
width:140px;
border-radius:50%;
box-shadow:0 0 25px #00c6ff;
animation:glow 2s infinite;
}
@keyframes glow{
0%{box-shadow:0 0 10px #00c6ff;}
50%{box-shadow:0 0 30px #00c6ff;}
100%{box-shadow:0 0 10px #00c6ff;}
}

/* Buttons */
.btn{
display:block;
margin:10px auto;
padding:14px;
border-radius:12px;
text-decoration:none;
color:white;
font-weight:bold;
transition:0.3s;
}
.telegram{background:linear-gradient(45deg,#0088cc,#00c6ff);}
.tiktok{background:linear-gradient(45deg,#000,#ff0050);}
.facebook{background:linear-gradient(45deg,#1877f2,#4c8bf5);}
.btn:hover{
transform:scale(1.08);
box-shadow:0 0 20px #38bdf8;
}

/* Mode Button */
.mode-btn{
position:fixed;
top:15px;
right:15px;
background:#00c6ff;
border:none;
padding:10px 15px;
border-radius:10px;
color:white;
cursor:pointer;
z-index:999;
}

/* Counter */
.counter{
margin-top:10px;
color:#00c6ff;
}

/* Ads */
.ad{
margin:20px;
padding:15px;
border-radius:15px;
background:rgba(255,255,255,0.05);
border:1px dashed rgba(255,255,255,0.2);
}
</style>
</head>

<body>

<!-- زر الوضع -->
<button class="mode-btn" onclick="toggleMode()">🌙 / ☀️</button>

<!-- Loader -->
<div id="loader"><div class="circle"></div></div>

<!-- إعلان -->
<div class="ad">ضع إعلان هنا</div>

<!-- Header -->
<div class="glass">
<img src="logo.jpg" class="logo">

<h1>HAKAMO</h1>
<p>Telegram Channel 🚀</p>

<p onclick="copyUser()" style="cursor:pointer;color:#38bdf8;">
@MohamedHakam99 (اضغط للنسخ)
</p>

<div class="counter">
👀 الزوار: <span id="visits">0</span>
</div>
</div>

<!-- About -->
<div class="glass">
<h2>🔥 نبذة عن القناة</h2>
<p>أفضل كونفجات الإنترنت المجاني 💯</p>
</div>

<!-- Links -->
<div class="glass">
<h2>📱 حساباتي</h2>

<a class="btn telegram" href="https://t.me/Hakamo99">Telegram</a>
<a class="btn tiktok" href="https://www.tiktok.com/@hakamo99">TikTok</a>
<a class="btn facebook" href="https://www.facebook.com/mohamedhakam990">Facebook</a>

</div>

<!-- Config -->
<div class="glass">
<h2>⚡ تحميل الكونفجات</h2>

<a class="btn telegram" href="go.html">
الدخول وتحميل 🚀
</a>

</div>

<script>
// Loader
window.onload = ()=>document.getElementById("loader").style.display="none";

// Copy
function copyUser(){
navigator.clipboard.writeText("@MohamedHakam99");
alert("تم النسخ ✅");
}

// Mode system
let mode = localStorage.getItem("mode") || "dark";
document.body.classList.add(mode);

function toggleMode(){
if(document.body.classList.contains("dark")){
document.body.classList.replace("dark","light");
localStorage.setItem("mode","light");
}else{
document.body.classList.replace("light","dark");
localStorage.setItem("mode","dark");
}
}

// Counter
fetch("https://api.countapi.xyz/hit/hakamo99/visits")
.then(res=>res.json())
.then(res=>{
document.getElementById("visits").innerText = res.value;
});
</script>

</body>
</html>
